name: Build and deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.148.2
      TZ: Asia/Shanghai
      HUGO_PARAMS_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      HUGO_PARAMS_SUPABASE_PUBLISHABLEKEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 0
          lfs: false

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Install Hugo
        run: |
          mkdir -p "${HOME}/.local/hugo"
          curl -sfL --output "${{ runner.temp }}/hugo.tar.gz" \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          tar -C "${HOME}/.local/hugo" -xf "${{ runner.temp }}/hugo.tar.gz"
          echo "${HOME}/.local/hugo" >> "${GITHUB_PATH}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build
        run: |
          hugo --gc --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/" \
            --cacheDir "${{ runner.temp }}/hugo_cache" \
            --destination "${{ runner.temp }}/site"

      - name: Check JavaScript syntax
        run: find assets/js -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Check local links
        run: node .github/scripts/check-local-links.mjs "${{ runner.temp }}/site"

      - name: Validate HTML
        run: npx --yes html-validate@9.4.0 --config .htmlvalidate.json "${{ runner.temp }}/site"

      - name: Smoke-test key pages and access states
        run: node .github/scripts/smoke-test.mjs "${{ runner.temp }}/site"

      - name: Serve generated site for HTTP smoke test
        run: |
          npx --yes serve@14.2.4 "${{ runner.temp }}/site" --listen 1313 > "${{ runner.temp }}/serve.log" 2>&1 &
          for route in / /posts/ /projects/ /study/ /about/ /account/ /auth/callback/ /now/; do
            curl --fail --silent --show-error "http://127.0.0.1:1313${route}" > /dev/null
          done

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          include-hidden-files: false
          path: ${{ runner.temp }}/site

  deploy:
    runs-on: ubuntu-latest
    needs: quality
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
