# 主题参数配置

# 配色方案 (可选: blowfish, ocean, forest, neon, terminal 等)
colorScheme = "blowfish"
description = "苏慧豪的个人数字花园：工程研究、数值仿真、编程实践与长期学习。"
keywords = ["旋转机械", "转子动力学", "流体机械", "CFD", "故障诊断", "Fluent UDF", "MATLAB", "Python"]
defaultSocialImage = "img/social-share.png"

# 外观设置
defaultAppearance = "light"  # light 或 dark
autoSwitchAppearance = true  # 跟随系统
defaultBackgroundImage = "img/background.png"  # 全局背景图

# 首页布局 (可选: page, profile, hero, card, background)
[homepage]
  layout = "background"
  homepageImage = "img/background.png"  # 背景图片
  showRecent = true
  showRecentItems = 5
  cardView = true                        # 卡片视图
  cardViewScreenWidth = true             # 约束宽度
  showSummary = false                    # 不显示简介

# 文章设置
[article]
  showDate = true
  showDateUpdated = false
  showAuthor = true
  showBreadcrumbs = true
  showDraftLabel = true
  showEdit = false
  showHeadingAnchors = true
  showPagination = true
  showReadingTime = true
  showTableOfContents = true
  showTaxonomies = true
  showWordCount = true
  showComments = true
  sharingLinks = ["linkedin", "twitter", "telegram", "email"]

# 列表页设置
[list]
  showBreadcrumbs = false
  showSummary = false
  showTableOfContents = false
  groupByYear = true

# 网站地图设置
[sitemap]
  excludedKinds = ["taxonomy", "term"]

# 分类法设置
[taxonomy]
  showTermCount = true

# 术语页设置
[term]
  showHero = false
  groupByYear = false

# 搜索
[search]
  type = "fuse"

# Firebase (可选，如不需要可删除)
