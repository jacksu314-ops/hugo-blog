{{ define "main" }}
<style>
    .error-page {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 66vh;
        text-align: center;
        padding: clamp(2rem, 5vw, 4rem);
    }

    .error-panel {
        width: min(920px, 100%);
        padding: clamp(2rem, 5vw, 4rem);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 18px;
        background:
            radial-gradient(circle at 20% 20%, rgba(96, 165, 250, 0.22), transparent 30%),
            radial-gradient(circle at 85% 75%, rgba(167, 139, 250, 0.18), transparent 34%),
            rgba(15, 23, 42, 0.9);
        box-shadow: 0 28px 80px rgba(15, 23, 42, 0.24);
        color: #fff;
    }

    .error-illustration {
        display: inline-grid;
        width: 76px;
        height: 76px;
        place-items: center;
        margin-bottom: 1rem;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.1);
        font-size: 2.5rem;
        animation: float 3s ease-in-out infinite;
    }

    .error-code {
        margin: 0;
        font-size: clamp(5rem, 16vw, 9rem);
        font-weight: 800;
        line-height: 0.95;
        background: linear-gradient(135deg, #93c5fd 0%, #a78bfa 50%, #f0abfc 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
    }

    .error-title {
        margin: 1rem 0 0.55rem;
        font-size: clamp(1.65rem, 4vw, 2.2rem);
        font-weight: 800;
    }

    .error-message {
        max-width: 520px;
        margin: 0 auto 2rem;
        color: rgba(255, 255, 255, 0.78);
        font-size: 1rem;
        line-height: 1.8;
    }

    .error-actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.9rem;
        margin-bottom: 2.5rem;
    }

    .error-btn {
        display: inline-flex;
        min-height: 46px;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        padding: 0.75rem 1.35rem;
        border-radius: 10px;
        font-weight: 700;
        text-decoration: none;
        transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .error-btn:hover {
        transform: translateY(-2px);
    }

    .error-btn-primary {
        background: linear-gradient(135deg, #60a5fa 0%, #8b5cf6 100%);
        color: #fff;
        box-shadow: 0 16px 36px rgba(96, 165, 250, 0.28);
    }

    .error-btn-secondary {
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
    }

    .error-suggestions {
        width: min(520px, 100%);
        margin: 0 auto;
        text-align: left;
    }

    .error-suggestions h3 {
        margin: 0 0 0.9rem;
        color: rgba(255, 255, 255, 0.82);
        font-size: 0.95rem;
        font-weight: 700;
        text-align: center;
    }

    .error-suggestions ul {
        display: grid;
        gap: 0.75rem;
        padding: 0;
        margin: 0;
        list-style: none;
    }

    .error-suggestions a {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.85rem 1rem;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.07);
        color: #bfdbfe;
        text-decoration: none;
        transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .error-suggestions a::after {
        content: "->";
        color: rgba(255, 255, 255, 0.58);
    }

    .error-suggestions a:hover {
        border-color: rgba(147, 197, 253, 0.56);
        background: rgba(96, 165, 250, 0.14);
        transform: translateX(3px);
    }

    @keyframes float {
        0%,
        100% {
            transform: translateY(0);
        }

        50% {
            transform: translateY(-8px);
        }
    }

    @media (max-width: 640px) {
        .error-page {
            padding: 1.25rem;
        }

        .error-panel {
            padding: 1.5rem;
            border-radius: 14px;
        }

        .error-actions {
            align-items: stretch;
            flex-direction: column;
        }

        .error-btn {
            width: 100%;
        }
    }
</style>

<div class="error-page">
    <div class="error-panel">
        <div class="error-illustration" aria-hidden="true">🔎</div>
        <h1 class="error-code">404</h1>
        <h2 class="error-title">页面迷路了</h2>
        <p class="error-message">
            抱歉，您访问的页面不存在或已被移动。可以回到首页，或者从下面几个常用入口继续浏览。
        </p>

        <div class="error-actions">
            <a href="{{ site.Home.RelPermalink }}" class="error-btn error-btn-primary">返回首页</a>
            <a href="{{ "search/" | relURL }}" class="error-btn error-btn-secondary">搜索内容</a>
        </div>

        <div class="error-suggestions">
            <h3>您可能想要访问</h3>
            <ul>
                <li><a href="{{ "posts/" | relURL }}">浏览所有文章</a></li>
                <li><a href="{{ "archives/" | relURL }}">查看文章归档</a></li>
                <li><a href="{{ "projects/" | relURL }}">查看项目展示</a></li>
                <li><a href="{{ "about/" | relURL }}">了解更多关于我</a></li>
            </ul>
        </div>
    </div>
</div>
{{ end }}
