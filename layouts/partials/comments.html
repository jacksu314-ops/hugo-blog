<section class="giscus-panel discussion-panel" aria-label="公开讨论区" data-discussion data-page-key="{{ .RelPermalink }}">
  <div class="giscus-panel-head">
    <p class="section-eyebrow">Discussion</p>
    <h2>公开讨论</h2>
    <p>阅读无需登录。通过邮箱验证后，可以发表评论和回复。</p>
  </div>
  <div class="discussion-state" data-discussion-state>正在连接讨论区...</div>
  <form class="discussion-form" data-discussion-form hidden>
    <div class="discussion-replying" data-discussion-replying hidden></div>
    <label for="discussion-body">发表评论</label>
    <textarea id="discussion-body" rows="4" maxlength="2000" required data-discussion-body placeholder="友善交流，分享你的建议或问题..."></textarea>
    <div class="discussion-form-actions">
      <span data-discussion-counter>0/2000</span>
      <button type="button" class="discussion-secondary" data-discussion-cancel-reply hidden>取消回复</button>
      <button type="submit" data-discussion-submit>发布评论</button>
    </div>
  </form>
  <div class="discussion-list" data-discussion-list></div>
  <template data-comment-template>
    <article class="discussion-comment">
      <div class="discussion-comment-head">
        <div><strong data-comment-author></strong><time data-comment-time></time></div>
        <span data-comment-status></span>
      </div>
      <p data-comment-body></p>
      <div class="discussion-comment-actions" data-comment-actions></div>
    </article>
  </template>
</section>
