{{- /* Inject custom animations JS using Hugo Pipes for minification and fingerprinting */ -}}
<script>
  (() => {
    document.documentElement.dataset.siteAccess = 'visitor';
    window.siteAuthReady = new Promise((resolve) => { window.resolveSiteAuth = resolve; });
  })();
</script>
{{- $js := resources.Get "js/animations.js" -}}
{{- if $js -}}
{{- $jsBundled := $js | resources.Minify | resources.Fingerprint -}}
<script defer src="{{ $jsBundled.RelPermalink }}" integrity="{{ $jsBundled.Data.Integrity }}"></script>
{{- end -}}
