{{- /* Inject custom animations JS using Hugo Pipes for minification and fingerprinting */ -}}
<script>
  (() => {
    const localHosts = ['localhost', '127.0.0.1', '::1'];
    const forceVisitor = new URLSearchParams(window.location.search).has('visitor-preview');
    document.documentElement.dataset.siteAccess = localHosts.includes(window.location.hostname) && !forceVisitor
      ? 'owner'
      : 'visitor';
  })();
</script>
{{- $js := resources.Get "js/animations.js" -}}
{{- if $js -}}
{{- $jsBundled := $js | resources.Minify | resources.Fingerprint -}}
<script defer src="{{ $jsBundled.RelPermalink }}" integrity="{{ $jsBundled.Data.Integrity }}"></script>
{{- end -}}
